<header class="site-header" role="banner">
  <div class="wrapper">

    <a class="site-title" rel="author" href="{{ '/' | relative_url }}">{{ site.title | escape }}</a>

    <nav class="site-nav">
      <input type="checkbox" id="nav-trigger" class="nav-trigger" />
      <label for="nav-trigger">
        <span class="menu-icon">
          <svg viewBox="0 0 18 15" width="18px" height="15px">
            <path d="M18,1.484c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,2.969,0,2.304,0,1.484l0,0C0,0.665,0.665,0,1.484,0 h15.032C17.335,0,18,0.665,18,1.484L18,1.484z M18,7.516C18,8.335,17.335,9,16.516,9H1.484C0.665,9,0,8.335,0,7.516l0,0 c0-0.82,0.665-1.484,1.484-1.484h15.032C17.335,6.031,18,6.696,18,7.516L18,7.516z M18,13.516C18,14.335,17.335,15,16.516,15H1.484 C0.665,15,0,14.335,0,13.516l0,0c0-0.82,0.665-1.483,1.484-1.483h15.032C17.335,12.031,18,12.695,18,13.516L18,13.516z"/>
          </svg>
        </span>
      </label>

      <div class="trigger">

        <div class="dropdown">
          <input type="checkbox" id="dropdown-trigger-about" class="dropdown-trigger" />
          <a href="{{ '/ourstory/' | relative_url }}" class="dropbtn">About</a>
          <div class="dropdown-content">
            <a href="{{ '/ourstory/' | relative_url }}"{% if page.url contains 'ourstory' %} class="nav-active"{% endif %}>Our Story</a>
            <a href="{{ '/team-members/' | relative_url }}"{% if page.url contains 'team' %} class="nav-active"{% endif %}>Team</a>
          </div>
        </div>

        <div class="dropdown">
          <input type="checkbox" id="dropdown-trigger-work" class="dropdown-trigger" />
          <a href="{{ '/products/' | relative_url }}" class="dropbtn">Work</a>
          <div class="dropdown-content">
            <a href="{{ '/products/' | relative_url }}"{% if page.url contains 'products' %} class="nav-active"{% endif %}>Products</a>
            <a href="{{ '/research/' | relative_url }}"{% if page.url contains 'research' %} class="nav-active"{% endif %}>Research</a>
            <a href="{{ '/lab_initiatives/' | relative_url }}"{% if page.url contains 'lab_initiatives' %} class="nav-active"{% endif %}>Lab Initiatives</a>
            <a href="{{ '/national_initiatives/' | relative_url }}"{% if page.url contains 'national' %} class="nav-active"{% endif %}>National Initiatives</a>
          </div>
        </div>

        <div class="dropdown">
          <input type="checkbox" id="dropdown-trigger-programmes" class="dropdown-trigger" />
          <a href="{{ '/openings/' | relative_url }}" class="dropbtn">Programmes</a>
          <div class="dropdown-content">
            <a href="{{ '/events/' | relative_url }}"{% if page.url contains 'events' %} class="nav-active"{% endif %}>Events</a>
            <a href="{{ '/openings/' | relative_url }}"{% if page.url contains 'openings' %} class="nav-active"{% endif %}>Openings</a>
            <a href="{{ '/vichara_logs/' | relative_url }}"{% if page.url contains 'vichara' %} class="nav-active"{% endif %}>Vichara Logs</a>
          </div>
        </div>

        <a class="page-link{% if page.url contains 'contact' %} nav-active{% endif %}" href="{{ '/contact/' | relative_url }}">Contact</a>

      </div>
    </nav>

  </div>
</header>
